name: release-preflight

on:
  pull_request:
    branches: [master]
    paths:
      - '**.rs'
      - 'README.md'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Justfile'
      - '.github/workflows/**'
      - 'docs/**'
      - 'openspec/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preflight-ubuntu-stable-all-features

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Resolve version
        id: version
        if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release/v')
        shell: bash
        run: bash scripts/release/resolve-release-version.sh "${{ github.event_name }}" "" "${{ github.head_ref }}"

      - name: Quality gate
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release/v')
        run: just JOBS=2 check

      - name: Release check
        if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release/v')
        run: just VERSION="${{ steps.version.outputs.version }}" release-check
