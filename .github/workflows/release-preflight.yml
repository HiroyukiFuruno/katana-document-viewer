name: release-preflight

on:
  pull_request:
    branches: [master]
    paths:
      - '**.rs'
      - 'README.md'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Justfile'
      - '.github/workflows/**'
      - 'docs/**'
      - 'openspec/**'
      - 'scripts/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  JAVA_TOOL_OPTIONS: -Xss16m -Djava.awt.headless=true -Djdk.lang.processReaperUseDefaultStackSize=true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-preflight-ubuntu-stable-all-features

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install diagram test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz imagemagick xvfb xclip
          sudo mkdir -p /opt/local/bin
          sudo ln -sf /usr/bin/dot /opt/local/bin/dot
          if ! command -v magick >/dev/null 2>&1; then
            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -euo pipefail' \
              'case "${1:-}" in' \
              '  identify|compare|montage)' \
              '    command="$1"' \
              '    shift' \
              '    exec "$command" "$@"' \
              '    ;;' \
              '  *)' \
              '    exec convert "$@"' \
              '    ;;' \
              'esac' | sudo tee /usr/local/bin/magick >/dev/null
            sudo chmod +x /usr/local/bin/magick
          fi
          echo "GRAPHVIZ_DOT=/opt/local/bin/dot" >> "$GITHUB_ENV"

      - name: Resolve version
        id: version
        if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release/v')
        shell: bash
        run: bash scripts/release/resolve-release-version.sh "${{ github.event_name }}" "" "${{ github.head_ref }}"

      - name: Quality gate
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'release/v')
        run: |
          just JOBS=2 check
          just coverage

      - name: Release check
        if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'release/v')
        run: just VERSION="${{ steps.version.outputs.version }}" release-check
