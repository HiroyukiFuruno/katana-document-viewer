name: Release

on:
  pull_request:
    types: [closed]
    branches: [master]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, e.g. 0.1.0 or v0.1.0. Defaults to Cargo.toml version."
        required: false
        type: string
      publish_crate:
        description: "Publish workspace crates to crates.io"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  JAVA_TOOL_OPTIONS: -Xss16m -Djava.awt.headless=true -Djdk.lang.processReaperUseDefaultStackSize=true

jobs:
  release:
    name: Release
    if: >
      github.event_name != 'pull_request' || (
        github.event.pull_request.merged == true &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'release/v')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.ref || github.ref }}
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-ubuntu-stable-publish

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install acceptance artifact dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz imagemagick xvfb xclip
          sudo mkdir -p /opt/local/bin
          sudo ln -sf /usr/bin/dot /opt/local/bin/dot
          if ! command -v magick >/dev/null 2>&1; then
            printf '%s\n' \
              '#!/usr/bin/env bash' \
              'set -euo pipefail' \
              'case "${1:-}" in' \
              '  identify|compare|montage)' \
              '    command="$1"' \
              '    shift' \
              '    exec "$command" "$@"' \
              '    ;;' \
              '  *)' \
              '    exec convert "$@"' \
              '    ;;' \
              'esac' | sudo tee /usr/local/bin/magick >/dev/null
            sudo chmod +x /usr/local/bin/magick
          fi
          echo "GRAPHVIZ_DOT=/opt/local/bin/dot" >> "$GITHUB_ENV"

      - name: Resolve version
        id: version
        shell: bash
        run: |
          bash scripts/release/resolve-release-version.sh \
            "${{ github.event_name }}" \
            "${{ inputs.version }}" \
            "${{ github.event.pull_request.head.ref }}"

      - name: Release verify
        run: |
          xvfb-run -a just storybook-release-acceptance-artifacts
          KDV_RELEASE_DOD_SKIP_ACCEPTANCE_FRESHNESS=1 xvfb-run -a just VERSION="${{ steps.version.outputs.version }}" release-verify

      - name: Create release tag
        env:
          TAG: ${{ steps.version.outputs.version }}
        run: |
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "refs/tags/${TAG}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "${TAG}" >/dev/null 2>&1; then
            gh release edit "${TAG}" --latest --verify-tag
          else
            gh release create "${TAG}" --verify-tag --latest --generate-notes
          fi
      - name: Publish crates.io
        if: github.event_name == 'pull_request' || inputs.publish_crate == true
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: bash scripts/release/publish-crates.sh "${{ steps.version.outputs.version }}"
