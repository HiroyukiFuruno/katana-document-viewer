name: CI

on:
  push:
    branches: [master]
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Justfile'
      - '.codex/**'
      - '.github/workflows/**'
      - 'README.md'
      - 'docs/**'
      - 'openspec/**'
      - 'scripts/**'
  pull_request:
    branches: [master]
    paths:
      - '**.rs'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'Justfile'
      - '.codex/**'
      - '.github/workflows/**'
      - 'README.md'
      - 'docs/**'
      - 'openspec/**'
      - 'scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: 0
  CARGO_TERM_COLOR: always
  JAVA_TOOL_OPTIONS: -Xss16m -Djava.awt.headless=true -Djdk.lang.processReaperUseDefaultStackSize=true

jobs:
  test:
    name: Test and Build
    # WHY: master merge commits already passed PR checks; direct pushes still run the matrix.
    if: >-
      github.event_name != 'push' || (
        !startsWith(github.event.head_commit.message, 'Merge pull request ') &&
        !contains(github.event.head_commit.message, '(#')
      )
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable
          components: clippy, rustfmt, llvm-tools-preview

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-${{ matrix.os }}-stable-default-nobin
          cache-bin: false

      - name: Install cargo-llvm-cov
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install just
        uses: taiki-e/install-action@just

      - name: Install Graphviz (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz
          sudo mkdir -p /opt/local/bin
          sudo ln -sf /usr/bin/dot /opt/local/bin/dot
          echo "GRAPHVIZ_DOT=/opt/local/bin/dot" >> "$GITHUB_ENV"

      - name: Install Graphviz (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          if ! command -v dot >/dev/null 2>&1; then
            brew install graphviz
          fi
          sudo mkdir -p /opt/local/bin
          sudo ln -sf "$(command -v dot)" /opt/local/bin/dot
          echo "GRAPHVIZ_DOT=/opt/local/bin/dot" >> "$GITHUB_ENV"

      - name: Install Graphviz (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          choco install graphviz --no-progress -y
          "GRAPHVIZ_DOT=C:\Program Files\Graphviz\bin\dot.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run subagent/Spark harness check
        run: just check-subagent-harness

      - name: Check types
        run: cargo check --workspace --locked

      - name: Check formatting
        if: matrix.os != 'windows-latest'
        run: just fmt-check

      - name: Run Windows format check
        if: matrix.os == 'windows-latest'
        run: cargo fmt --all -- --check

      - name: Run linter
        if: matrix.os != 'windows-latest'
        run: just lint

      - name: Run AST linter
        if: matrix.os != 'windows-latest'
        run: just ast-lint

      - name: Run tests
        run: |
          cargo test --workspace --locked --exclude kdv-storybook
          cargo test -p kdv-storybook --locked -- --test-threads=1

      - name: Run coverage
        if: matrix.os == 'ubuntu-latest'
        run: just coverage
