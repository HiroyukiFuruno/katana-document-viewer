[workspace]
members = [
    "crates/katana-markdown-preview",
    "crates/katana-markdown-preview-egui",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
license = "MIT"
repository = "https://github.com/HiroyukiFuruno/katana-markdown-preview"
rust-version = "1.95.0"
authors = ["Hiroyuki Furuno"]

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
thiserror = "2"
egui = "0.34"
