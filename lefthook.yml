# lefthook.yml
no_tty: true
output:
  - failure

pre-commit:
  parallel: false
  commands:
    formatting:
      glob: "*.rs"
      run: just fmt

pre-push:
  files: git diff --name-only HEAD master
  commands:
    check-strict:
      run: sh -c 'just JOBS=2 check' -- {files}
      glob: "*.{rs,toml,lock}"
